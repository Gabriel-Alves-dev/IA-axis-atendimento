# Config do site app.axisb2b.com pro Nginx do HOST (não é usada dentro do
# Docker — este arquivo é copiado manualmente pra /etc/nginx/sites-available/
# na VPS, junto dos outros sites que já existem lá).
#
# Uso:
#   cp deploy/nginx-app.conf /etc/nginx/sites-available/app.axisb2b.com
#   ln -s /etc/nginx/sites-available/app.axisb2b.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d app.axisb2b.com   # emite e configura HTTPS automaticamente
#
# O certbot reescreve este arquivo sozinho na primeira execução, adicionando
# os blocos "listen 443 ssl" e o redirect de 80->443 — não precisa fazer isso
# manualmente, a versão abaixo é só o ponto de partida em HTTP.

server {
    listen 80;
    listen [::]:80;
    server_name app.axisb2b.com;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
